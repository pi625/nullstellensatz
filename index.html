---
layout: default
title: Home
---
<section>
  <h1>{{ site.title }}</h1>
  <p>{{ site.description }}</p>
</section>
<section>
  <h2>Posts</h2>
  <ul>
  {% for post in site.posts %}
    <li><a href="{{ post.url | relative_url }}">{{ post.title }}</a> — <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%B %d, %Y" }}</time></li>
  {% endfor %}
  </ul>
</section>
